name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: |
          echo '## `go vet`' >> "$GITHUB_STEP_SUMMARY"
          if output=$(go vet ./... 2>&1); then
            echo '✅ No issues found' >> "$GITHUB_STEP_SUMMARY"
          else
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$output" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$output"
            exit 1
          fi

      - name: Install golangci-lint
        if: matrix.go-version == '1.26'
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.0.2

      - name: Lint
        if: matrix.go-version == '1.26'
        run: |
          echo '## Lint (golangci-lint)' >> "$GITHUB_STEP_SUMMARY"
          if output=$(golangci-lint run ./... 2>&1); then
            echo '✅ No issues found' >> "$GITHUB_STEP_SUMMARY"
          else
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$output" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$output"
            exit 1
          fi

      - name: Test
        run: go test -coverprofile=coverage.out ./...

      - name: Coverage summary
        if: matrix.go-version == '1.26'
        run: |
          echo '## Coverage' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | tail -20 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Filter coverage
        if: matrix.go-version == '1.26'
        run: |
          grep -v -E '/(cmd/|main\.go:|internal/output/printer\.go:|internal/proxy/(subprocess|terminal|dashboard)\.go:|internal/wallet/(register_darwin|server)\.go:|internal/qr/screen\.go:|internal/format/input\.go:|internal/web/handler\.go:)' coverage.out > coverage-filtered.out || true

      - name: Upload coverage
        if: matrix.go-version == '1.26'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-filtered.out

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: e2e
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-test-results
          path: e2e/test-results/
