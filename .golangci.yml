version: "2"

linters:
  default: none
  enable:
    - errcheck
    - errorlint
    - gosec
    - govet
    - staticcheck
    - unused

  settings:
    errcheck:
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - (io.Writer).Write
        - (*github.com/fatih/color.Color).Printf
        - (*github.com/fatih/color.Color).Println
        - (*github.com/fatih/color.Color).Fprintf
        - (*github.com/fatih/color.Color).Print
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Printf
        - (io.Closer).Close
        - (*os.File).Close
        - (*net/http.Server).Close
        - (*text/tabwriter.Writer).Flush
        - os.Remove
        - os.RemoveAll
    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST1000"
        - "-ST1005"
    gosec:
      excludes:
        - G104
        - G107
        - G112
        - G114
        - G115
        - G204
        - G304
        - G306
        - G301

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/dominikschlosser/oid4vc-dev
