services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.0
    command:
      - start-dev
      - --import-realm
      - --features=oid4vc-vci:v1,oid4vc-vci-preauth-code:v1
      - --http-port=8080
      - --proxy-headers=xforwarded
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./realm:/opt/keycloak/data/import:ro
